            {% else %}

                    alt="Profile"

        </div>

<script>

function updateClock(){

    const now=new Date();

    let h=now.getHours();

    let m=now.getMinutes();

    const ampm=h>=12?"PM":"AM";

    h=h%12;

    if(h===0) h=12;

    if(m<10) m="0"+m;

    document.getElementById("clock").innerHTML=

        h+":"+m+" "+ampm;

}

updateClock();

setInterval(updateClock,1000);

</script>
