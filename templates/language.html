<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Select Language | AgriMitra AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0F766E,#14B8A6,#22C55E);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

        }

        .card{

            width:420px;

            background:white;

            border-radius:30px;

            padding:35px;

            box-shadow:0 20px 40px rgba(0,0,0,.15);

        }

        .logo{

            text-align:center;

            font-size:65px;

        }

        h1{

            text-align:center;

            color:#0F766E;

            margin-top:10px;

            font-size:28px;

        }

        .subtitle{

            text-align:center;

            color:#666;

            margin:8px 0 30px;

        }

        .language{

            display:flex;

            align-items:center;

            justify-content:space-between;

            padding:16px 20px;

            margin-bottom:15px;

            border:2px solid #E5E7EB;

            border-radius:15px;

            cursor:pointer;

            transition:.3s;

        }

        .language:hover{

            border-color:#16A34A;

            background:#ECFDF5;

        }

        .language.selected{

            border-color:#16A34A;

            background:#DCFCE7;

        }

        .left{

            display:flex;

            align-items:center;

            gap:15px;

            font-size:18px;

            font-weight:500;

        }

        .continue{

            width:100%;

            margin-top:20px;

            padding:16px;

            background:#16A34A;

            color:white;

            border:none;

            border-radius:15px;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

        }

        .continue:hover{

            background:#0F766E;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="logo">🌿</div>

    <h1>AgriMitra AI</h1>

    <p class="subtitle">Choose Your Preferred Language</p>

    <div class="language selected">
        <div class="left" data-lang="en">🇬🇧 English</div>
        ✔
    </div>

    <div class="language">
        <div class="left" data-lang="hi">🇮🇳 हिन्दी</div>
    </div>

    <div class="language">
        <div class="left" data-lang="pa">🇮🇳 ਪੰਜਾਬੀ</div>
    </div>

    <div class="language">
        <div class="left" data-lang="gu">🇮🇳 ગુજરાતી</div>
    </div>

    <div class="language">
        <div class="left" data-lang="mr">🇮🇳 मराठी</div>
    </div>

    <div class="language">
        <div class="left" data-lang="ta">🇮🇳 தமிழ்</div>
    </div>

    <button class="continue" id="continueBtn">
    Continue →
    </button>

<script>
    const languageItems = document.querySelectorAll('.language');
    let selected = document.querySelector('.language.selected');
    languageItems.forEach(item => {
        item.addEventListener('click', () => {
            if (selected) selected.classList.remove('selected');
            item.classList.add('selected');
            selected = item;
        });
    });

    document.getElementById('continueBtn').addEventListener('click', async () => {
        const langEl = selected.querySelector('.left');
        const lang = langEl && langEl.dataset && langEl.dataset.lang ? langEl.dataset.lang : 'en';
        try {
            await fetch('/set_language', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lang })
            });
        } catch (e) {
            console.error(e);
        }
        window.location.href = '/home';
    });
</script>

</div>

</body>

</html>
