<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AgriMitra AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0F766E,#16A34A,#34D399);

            overflow:hidden;

        }

        .container{

            text-align:center;

            color:white;

        }

        .logo{

            font-size:90px;

            animation:float 2s ease-in-out infinite;

        }

        h1{

            margin-top:20px;

            font-size:42px;

            font-weight:700;

        }

        p{

            margin-top:15px;

            font-size:18px;

            opacity:.9;

        }

        .loader{

            margin:40px auto;

            width:65px;

            height:65px;

            border:6px solid rgba(255,255,255,.3);

            border-top:6px solid white;

            border-radius:50%;

            animation:spin 1s linear infinite;

        }

        @keyframes spin{

            100%{

                transform:rotate(360deg);

            }

        }

        @keyframes float{

            50%{

                transform:translateY(-12px);

            }

        }

    </style>

</head>

<body>

<div class="container">

    <h3 style="letter-spacing:4px;font-weight:500;">

        WELCOME TO

    </h3>

    <h1 style="margin-top:12px;">

        AgriMitra AI

    </h1>

    <div class="logo">

        🌿

    </div>

    <p>

        Smart Farming • Smart Future

    </p>

    <div class="loader"></div>

    <p style="font-size:15px;opacity:.85;">

        Initializing AI...

    </p>

</div>
<script>

setTimeout(function(){

    window.location.href="/language";

},3000);

</script>
</body>

</html>
