<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password | AgriMitra AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f6f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #256428;
        }

        a {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #2e7d32;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Reset Password</h2>

    <p>Enter your email and we will send reset link</p>

    <form method="POST">

        <input type="email" name="email" placeholder="Enter Email" required>

        <button type="submit">Send Reset Link</button>

    </form>

    <a href="/login">Back to Login</a>

</div>

</body>
</html>
